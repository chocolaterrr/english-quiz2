<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ターゲット1900 英単語アプリ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f5f7fa; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { text-align: center; font-size: 1.4rem; color: #2c3e50; margin-bottom: 5px; }
        .guide-box { background-color: #ebf5fb; border-left: 4px solid #3498db; padding: 12px; border-radius: 4px; margin-bottom: 15px; font-size: 0.9rem; line-height: 1.5; color: #2c3e50; }
        
        .select-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .select-container { flex: 1; background-color: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #e1e8ed; }
        .select-label { font-size: 0.85rem; font-weight: bold; color: #7f8c8d; margin-bottom: 5px; display: block; }
        select { width: 100%; padding: 10px; font-size: 0.95rem; border-radius: 6px; border: 1px solid #bdc3c7; background-color: #fff; cursor: pointer; box-sizing: border-box; }

        .btn-refresh { display: block; width: 100%; background: #3498db; color: #fff; border: none; padding: 12px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; text-align: center; margin-bottom: 20px; transition: background 0.2s; }
        .btn-refresh:active { background: #2980b9; }
        .quiz-row { display: flex; align-items: center; background: #fff; border: 1px solid #e1e8ed; border-radius: 8px; margin-bottom: 10px; padding: 10px; }
        .question { font-size: 1.2rem; font-weight: bold; width: 120px; flex-shrink: 0; color: #2c3e50; word-break: break-all; }
        .answers { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; padding-left: 10px; border-left: 2px solid #e1e8ed; }
        .answer-item { font-size: 0.9rem; color: #7f8c8d; display: none; }
        .answer-item span { color: #e74c3c; font-weight: bold; }
        .quiz-row.show .answer-item { display: block; }
        .toggle-btn { background: #fff; border: 2px solid #bdc3c7; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .quiz-row.show .toggle-btn { border-color: #2ecc71; color: #2ecc71; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 英単語テスト</h1>
    
    <div class="guide-box">
        💡 <strong>遊び方</strong><br>
        英単語の意味を頭の中で思い浮かべてみよう！<br>
        右側の <strong>👁️ ボタンを押すと、その行の日本語の意味がパッと表示</strong> されます。
    </div>

    <div class="select-group">
        <div class="select-container">
            <span class="select-label">出題範囲：</span>
            <select id="section-select" onchange="generateQuiz()">
                <option value="section1">1〜100番（Part1-1）</option>
            </select>
        </div>
        
        <div class="select-container">
            <span class="select-label">問題数：</span>
            <select id="count-select" onchange="generateQuiz()">
                <option value="15">15問</option>
                <option value="30">30問</option>
                <option value="50">50問</option>
            </select>
        </div>
    </div>

    <button class="btn-refresh" onclick="generateQuiz()">🔄 問題を新しくする（シャッフル）</button>
    <div id="quiz-list"></div>
</div>

<script>
    const wordDataset = {
      section1: [
        {word:"create", mean:"を創造する、作り出す"},{word:"increase", mean:"増加する、を増やす"},{word:"decrease", mean:"減少する、を減らす"},{word:"improve", mean:"を向上させる、改善する"},{word:"provide", mean:"を提供する、供給する"},{word:"develop", mean:"を発達させる、開発する"},{word:"include", mean:"を含む、含める"},{word:"exclude", mean:"を排除する、除外する"},{word:"reduce", mean:"減らす、縮小する"},{word:"produce", mean:"を生産する、製造する"},{word:"allow", mean:"を許可する、認める"},{word:"forbid", mean:"を禁止する"},{word:"accept", mean:"を受け入れる、承認する"},{word:"refuse", mean:"を拒否する、断る"},{word:"remain", mean:"のままでいる、残る"},{word:"require", mean:"を必要とする、要求する"},{word:"request", mean:"を要請する、頼む"},{word:"suggest", mean:"を提案する、暗示する"},{word:"contain", mean:"を内包する、含む"},{word:"maintain", mean:"を維持する、保つ"},{word:"protect", mean:"を保護する、守る"},{word:"destroy", mean:"を破壊する"},{word:"prevent", mean:"を防ぐ、妨げる"},{word:"encourage", mean:"を励ます、促進する"},{word:"discourage", mean:"を落胆させる"},{word:"achieve", mean:"を達成する、成し遂げる"},{word:"fail", mean:"失敗する、落ちる"},{word:"establish", mean:"を設立する、確立する"},{word:"suppose", mean:"だと思う、仮定する"},{word:"assume", mean:"だと想定する、引き受ける"},{word:"determine", mean:"を決定する、決意する"},{word:"identify", mean:"を特定する、確認する"},{word:"observe", mean:"を観察する、気づく"},{word:"discover", mean:"を発見する"},{word:"explore", mean:"を探索する、探検する"},{word:"ignore", mean:"を無視する"},{word:"avoid", mean:"を避ける、回避する"},{word:"perform", mean:"を行う、上演する"},{word:"conduct", mean:"を行う"},{word:"manage", mean:"を何とかやり遂げる"},{word:"afford", mean:"する余裕がある"},{word:"deserve", mean:"に値する、ふさわしい"},{word:"express", mean:"を表現する、言い表す"},{word:"indicate", mean:"を指し示す、示す"},{word:"reveal", mean:"を明らかにする、暴露する"},{word:"conceal", mean:"を隠す"},{word:"represent", mean:"を代表する、表す"},{word:"replace", mean:"に取って代わる、取り替える"},{word:"remove", mean:"を取り除く、移動させる"},{word:"attract", mean:"を引きつける、魅了する"},{word:"reject", mean:"を拒絶する"},{word:"admire", mean:"に感嘆する、称賛する"},{word:"despise", mean:"を軽蔑する、見下す"},{word:"appreciate", mean:"を正しく評価する"},{word:"recognize", mean:"を認める、識別する"},{word:"realize", mean:"を悟る、実現する"},{word:"praise", mean:"を褒める、称賛する"},{word:"criticize", mean:"を批判する、非難する"},{word:"blame", mean:"のせいにする、非難する"},{word:"forgive", mean:"を許す"},{word:"punish", mean:"を罰する"},{word:"reward", mean:"に報いる、報酬を与える"},{word:"satisfy", mean:"を満足させる"},{word:"disappoint", mean:"を失望させる"},{word:"complain", mean:"不満を言う、苦情を訴える"},{word:"intend", mean:"するつもりである"},{word:"decide", mean:"を決める、決意する"},{word:"resolve", mean:"を解決する、決議する"},{word:"supply", mean:"を供給する"},{word:"demand", mean:"を要求する"},{word:"offer", mean:"を提供する、申し出る"},{word:"propose", mean:"を提案する"},{word:"insist", mean:"を主張する、言い張る"},{word:"assert", mean:"を断言する、強く主張する"},{word:"deny", mean:"を否定する、拒む"},{word:"admit", mean:"認める、受け入れる"},{word:"confess", mean:"を告白する、白状する"},{word:"publish", mean:"を出版する、発表する"},{word:"broadcast", mean:"を放送する"},{word:"advertise", mean:"を広告する、宣伝する"},{word:"consume", mean:"を消費する"},{word:"waste", mean:"を浪費する、無駄にする"},{word:"save", mean:"を救う、蓄える、省く"},{word:"spend", mean:"を費やす、過ごす"},{word:"earn", mean:"を稼ぐ、得る"},{word:"gain", mean:"を獲得する、増す"},{word:"obtain", mean:"を手に入れる、得る"},{word:"lose", mean:"を失う、負ける"},{word:"possess", mean:"を所有する、持っている"},{word:"own", mean:"を所有している"},{word:"belong", mean:"所属する、属する"},{word:"acquire", mean:"を獲得する、習得する"},{word:"inherit", mean:"を相続する、受け継ぐ"},{word:"purchase", mean:"を購入する"},{word:"worth", mean:"の価値がある"}
      ]
    };

    function generateQuiz() {
        const sectionSelect = document.getElementById('section-select');
        const countSelect = document.getElementById('count-select');
        const activeSection = sectionSelect.value;
        const quizCount = parseInt(countSelect.value, 10);
        
        let currentList = wordDataset[activeSection] || [];

        const shuffled = [...currentList].sort(() => Math.random() - 0.5);
        const selected = shuffled.slice(0, quizCount);
        
        const quizList = document.getElementById('quiz-list');
        quizList.innerHTML = '';

        selected.forEach((item, index) => {
            const row = document.createElement('div');
            row.className = 'quiz-row';
            row.id = `row-${index}`;
            row.innerHTML = `
                <div class="question">${item.word}</div>
                <div class="answers">
                    <div class="answer-item"><span>意味：</span>${item.mean}</div>
                </div>
                <button class="toggle-btn" onclick="toggleAnswer(${index})">👁️</button>
            `;
            quizList.appendChild(row);
        });
    }

    function toggleAnswer(index) {
        const row = document.getElementById(`row-${index}`);
        row.classList.toggle('show');
        const btn = row.querySelector('.toggle-btn');
        btn.textContent = row.classList.contains('show') ? '✓' : '👁️';
    }

    window.addEventListener('load', generateQuiz);
</script>
</body>
</html>
