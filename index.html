<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ターゲット1900 英単語アプリ</title>
    <style>body{font-family:'Helvetica Neue',Arial,sans-serif;background-color:#f5f7fa;margin:0;padding:15px;color:#333}.container{max-width:600px;margin:0 auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.05)}h1{text-align:center;font-size:1.4rem;color:#2c3e50;margin-bottom:5px}.guide-box{background-color:#ebf5fb;border-left:4px solid #3498db;padding:12px;border-radius:4px;margin-bottom:15px;font-size:0.9rem;line-height:1.5;color:#2c3e50}.select-group{display:flex;gap:10px;margin-bottom:20px}.select-container{flex:1;background-color:#f8f9fa;padding:12px;border-radius:8px;border:1px solid #e1e8ed}.select-label{font-size:0.85rem;font-weight:bold;color:#7f8c8d;margin-bottom:5px;display:block}select{width:100%;padding:10px;font-size:0.95rem;border-radius:6px;border:1px solid #bdc3c7;background-color:#fff;cursor:pointer;box-sizing:border-box}.btn-refresh{display:block;width:100%;background:#3498db;color:#fff;border:none;padding:12px;font-size:1rem;font-weight:bold;border-radius:8px;cursor:pointer;text-align:center;margin-bottom:20px;transition:background 0.2s}.btn-refresh:active{background:#2980b9}.quiz-row{display:flex;align-items:center;background:#fff;border:1px solid #e1e8ed;border-radius:8px;margin-bottom:10px;padding:10px}.question{font-size:1.2rem;font-weight:bold;width:120px;flex-shrink:0;color:#2c3e50;word-break:break-all}.answers{flex-grow:1;display:flex;flex-direction:column;gap:4px;padding-left:10px;border-left:2px solid #e1e8ed}.answer-item{font-size:0.9rem;color:#7f8c8d;display:none}.answer-item span{color:#e74c3c;font-weight:bold}.quiz-row.show .answer-item{display:block}.toggle-btn{background:#fff;border:2px solid #bdc3c7;width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}.quiz-row.show .toggle-btn{border-color:#2ecc71;color:#2ecc71}</style>
</head>
<body>
<div class="container">
    <h1>📊 英単語テスト</h1>
    <div class="guide-box">💡 <strong>遊び方</strong><br>英単語の意味を頭の中で思い浮かべてみよう！<br>右側の <strong>👁️ ボタンを押すと、正解がパッと表示</strong> されます。</div>
    <div class="select-group">
        <div class="select-container">
            <span class="select-label">出題範囲：</span>
            <select id="section-select" onchange="generateQuiz()">
                <option value="section1">1〜100番</option>
                <option value="section2">101〜200番</option>
                <option value="section3">201〜300番</option>
                <option value="section4">301〜400番</option>
                <option value="section5">401〜500番</option>
                <option value="all">全範囲（1〜500番）</option>
            </select>
        </div>
        <div class="select-container">
            <span class="select-label">問題数：</span>
            <select id="count-select" onchange="generateQuiz()">
                <option value="15">15問</option>
                <option value="30">30問</option>
                <option value="50">50問</option>
            </select>
        </div>
    </div>
    <button class="btn-refresh" onclick="generateQuiz()">🔄 問題を新しくする（シャッフル）</button>
    <div id="quiz-list"></div>
</div>
<script src="words_data.js"></script>
<script>
    function generateQuiz(){const e=document.getElementById("section-select"),t=document.getElementById("count-select"),n=e.value,c=parseInt(t.value,10);if(typeof wordDataset=="undefined"){document.getElementById("quiz-list").innerHTML='<div style="text-align:center;color:#e74c3c;padding:20px;">データが見つかりません。</div>';return}let s=[];if(n==="all"){s=Object.values(wordDataset).flat()}else{s=wordDataset[n]||[]}const a=[...s].sort(()=>Math.random()-.5),o=a.slice(0,c),r=document.getElementById("quiz-list");r.innerHTML="",o.forEach((e,t)=>{const n=document.createElement("div");n.className="quiz-row",n.id=`row-${t}`,n.innerHTML=`<div class="question">${e.word}</div><div class="answers"><div class="answer-item"><span>意味：</span>${e.mean}</div></div><button class="toggle-btn" onclick="toggleAnswer(${t})">👁️</button>`,r.appendChild(n)})}function toggleAnswer(e){const t=document.getElementById(`row-${e}`);t.classList.toggle("show");const n=t.querySelector("button");n.textContent=t.classList.contains("show")?"✓":"👁️"}window.addEventListener("load",generateQuiz);
</script>
</body>
</html>
